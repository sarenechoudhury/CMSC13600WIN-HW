<!DOCTYPE html>
<html>
<head>
    <title>Create User</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 40px;
        }

        form {
            display: inline-block;
            text-align: left;
            padding: 20px;
            border: 1px solid #cccccc;
        }

        label, input {
            display: block;
            margin-bottom: 12px;
            width: 260px;
        }

        .radio-group {
            margin-bottom: 12px;
        }

        .radio-group input {
            width: auto;
            display: inline;
        }

        .radio-group label {
            display: inline;
            width: auto;
            margin-right: 15px;
        }
    </style>
</head>
<body>
    <h1>Create a New User</h1>

    <form action="/app/api/createUser/" method="post">
        {% csrf_token %}

        <label for="user_name">User Name</label>
        <input type="text" id="user_name" name="user_name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <label>User Type</label>
        <div class="radio-group">
            <input type="radio" id="harvester" name="is_curator" value="0" checked>
            <label for="harvester">Harvester</label>

            <input type="radio" id="curator" name="is_curator" value="1">
            <label for="curator">Curator</label>
        </div>

        <input type="submit" value="Sign Up">
    </form>
</body>
</html>
